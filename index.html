<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padaria Inconfidentes</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="cabecalho"> 
        <!-- Menu Hamburguer -->    
        <nav class="navbar">
            <div class="logo">INCONFIDENTE</div>
           
            <div class="burger" id="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
           
            <ul class="nav-menu" id="navMenu">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="./paginas/produtos.html" class="nav-link">Produtos</a></li>
                <li class="nav-item"><a href="./paginas/pedidos.html" class="nav-link">Pedidos</a></li>
            </ul>
        </nav>
        <!-- Logo da padaria -->
        <div class="Título">
            <h3 class="subtitulo">Pão de Queijo<br> & <br> Café</h3>
        </div>
    </header>

    <!-- Barra de pesquisa -->
    <div class="search-container">
        <input type="text" class="search-bar" placeholder="🔍 Buscar produtos...">
    </div>


    <!-- Carrosel das categorias de produtos -->
    <div class="container-slider">
        <button id="prevButton" alt="Anterior">&#10094;</button>
        <div class="container-images">
            <img src="./imagens/pao_de_queijo_slider.png" alt="Pão de Queijo" class="slider-image on">
            <img src="./imagens/cafe_coado_slider.jfif" alt="Café coado" class="slider-image">
            <img src="./imagens/doces_mineiros_slider.jfif" alt="Doces Mineiros" class="slider-image">
            <img src="./imagens/salgados_mineiros_slider.jfif" alt="Salgados Mineiros" class="slider-image">
            <img src="./imagens/quitutes_de_balcao_slider.jfif" alt="Quitutes de Balcão" class="slider-image">
        </div>
        <button id="nextButton" alt="Próximo">&#10095;</button>
    </div>
    

    <script src="./src/main.js"></script>
    <script src="./src/carrossel.js" defer></script>
</body>
</html>
