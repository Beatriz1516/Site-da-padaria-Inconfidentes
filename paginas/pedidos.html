<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padaria Inconfidentes</title>
    <link rel="stylesheet" href="../style.css">
    <script src="../src/carrinho.js"></script>
    <script src="../src/itens_do_pedido.js"></script>
    <script src="C:\Users\USER\Desktop\SITE DA PADARIA INCONFIDENTES\src\main.js"></script>
</head>
<body>
    <!-- Topo da página do carrinho -->
    <img class="voltar" src="../imagens/flecha_voltar.png" onclick="window.history.back()">

    <!-- Lista de itens do pedido -->
    <div class="container-carrinho">
        <h2 class="tituloPagina">— Carrinho de produtos —</h2>

        <!-- Lista dos produtos -->
        <div id="lista-carrinho"></div>

        <!-- Resumo da compra -->
        <div class="valores-resumo">
            <p>Subtotal: <span id="subtotal-valor">R$ 0,00</span></p>
            <p>Entrega: <span id="entrega-valor">R$ 5,00</span></p>
            <p>Desconto: <span id="desconto-valor">R$ 0,00</span></p>
        </div>

        <!-- Botão de pagamento -->
        <button id="botao-pagamento-vermelho" onclick="avancarParaPagamento()" >
            Avançar para o Pagamento <br>
            <span id="total-botao">R$ 0,00</span>
        </button>
    </div>
</body>
</html>
